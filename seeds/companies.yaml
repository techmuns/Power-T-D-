# Power T&D investment universe.
# Source: investment framework doc, sections 1 and 15-20.
# Each company is mapped to one primary bucket (the diligence template
# in the framework differs by bucket). A company can have a secondary
# bucket where its second line of business is material.
#
# BSE scrip codes and NSE symbols verified against public exchange listings.
# Where a code is uncertain (recent IPOs), it is marked `verify: true` so
# the fetch step will log a warning rather than fail silently.

