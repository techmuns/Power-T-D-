name: Fetch Power T&D data

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days of announcement history to pull"
        default: "365"
      per_company:
        description: "Max new PDFs / LLM extractions per company per run"
        default: "8"
      since:
        description: "Oldest announcement date (YYYY-MM-DD) to download PDFs for"
        default: "2024-01-01"
      workers:
        description: "Parallel PDF download workers"
        default: "8"
      skip_rhp:
        description: "Skip the 20 SEBI RHP/DRHP heavy downloads (faster)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "seeds/**"
      - "requirements.txt"
      - ".github/workflows/fetch-data.yml"
  schedule:
    # 02:30 UTC daily ~ 08:00 IST, after most evening filings
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DAYS: ${{ github.event.inputs.days || '365' }}
          PER_COMPANY: ${{ github.event.inputs.per_company || '8' }}
          SINCE: ${{ github.event.inputs.since || '2024-01-01' }}
          WORKERS: ${{ github.event.inputs.workers || '8' }}
          SKIP_RHP: ${{ github.event.inputs.skip_rhp || 'false' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--days $DAYS --per-company $PER_COMPANY --since $SINCE --workers $WORKERS"
          if [ "$SKIP_RHP" = "true" ]; then ARGS="$ARGS --skip-rhp"; fi
          python -m pipeline.cli fetch-all $ARGS
          python -m pipeline.cli status

      - name: Commit fetched data
        run: |
          git config user.name  "power-td-bot"
          git config user.email "power-td-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "data: refresh ${ts}"
          for delay in 0 2 4 8 16; do
            sleep "$delay"
            git pull --rebase origin main || true
            git push origin HEAD:main && exit 0
          done
          exit 1
